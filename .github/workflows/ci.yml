name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ─── Backend Unit Tests ────────────────────────────────────────
  backend-tests:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: frontend/api/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests (offline, mocked Firebase)
        run: python -m pytest tests/ -v --ignore=tests/test_smoke.py

  # ─── Live Smoke Tests (main branch only) ──────────────────────
  smoke-tests:
    name: Live Smoke Test
    runs-on: ubuntu-latest
    needs: backend-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests pytest

      - name: Run smoke tests against live Vercel URL
        env:
          VERCEL_URL: ${{ secrets.VERCEL_URL }}
        run: python -m pytest frontend/api/tests/test_smoke.py -v

  # ─── Frontend Tests + Build Check ─────────────────────────────
  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build Next.js
        working-directory: frontend
        run: npm run build
